services:
  wellpaw-model:
    build: .
    container_name: wellpaw_model
    ports:
      - "50002:50002"
    environment:
      - APP_PORT=50002
      - PYTHONUNBUFFERED=1
    volumes:
      - ./model:/app/model
      - ./mapping:/app/mapping
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 7.5G